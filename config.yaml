# ═══════════════════════════════════════════════════════════
# config.yaml — Marathi Mitra
# Best hyperparameters found via Optuna (v3)
# Unseen score: 82.0%
# ═══════════════════════════════════════════════════════════

model:
  name: "microsoft/Phi-3-mini-4k-instruct"
  max_seq_length: 512

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  learning_rate: 0.00023604024417191158
  epochs: 32
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  fp16: true
  logging_steps: 10
  output_dir: "./results/best_model"
  quantization: "4bit"
  train_test_split: 0.2

data:
  vocabulary_file: "./data/vocabulary.json"
  dataset_file:    "./data/vocabulary_dataset.json"
  text_field:      "text"

huggingface:
  model_repo: "ninadp/marathi-mitra-phi3-v3"

optuna:
  n_trials: 20
  hardware: "A100"
  optimized_for: "unseen_word_score"
  baseline_v2_unseen: 78.8
  best_unseen: 82.0
  best_trial: 6