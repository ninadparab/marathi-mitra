# ═══════════════════════════════════════════════════════════
# config.yaml — Marathi Mitra
# Best hyperparameters found via experiments in
# notebooks/02_finetune.ipynb
#
# Used by: src/train.py
# To reproduce best model: python src/train.py
# ═══════════════════════════════════════════════════════════

# ── Model ───────────────────────────────────────────────────
model:
  name: "microsoft/Phi-3-mini-4k-instruct"
  max_seq_length: 512

# ── LoRA Adapter ────────────────────────────────────────────
lora:
  r: 16                      # rank — update after experiments
  alpha: 32                  # always 2x rank
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

# ── Training ────────────────────────────────────────────────
training:
  learning_rate: 0.0002      # update with winning value
  epochs: 25                 # update with winning value
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  fp16: true
  logging_steps: 10
  output_dir: "./results/best_model"

# ── Data ────────────────────────────────────────────────────
data:
  vocabulary_file: "./data/vocabulary.json"
  dataset_file:    "./data/vocabulary_dataset.json"
  text_field:      "text"

# ── Hugging Face ────────────────────────────────────────────
huggingface:
  model_repo: "ninadp/marathi-mitra-phi3"  